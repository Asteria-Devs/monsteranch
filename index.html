<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MonsteRanch</title>
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Cabin:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rust:    #C0440A;
      --amber:   #E8891A;
      --cream:   #F5EAD0;
      --shadow:  #1A0A00;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    body {
      font-family: 'Cabin', sans-serif;
      background:
        /* top dark vignette */
        radial-gradient(ellipse 120% 60% at 50% 0%, rgba(10,4,0,0.72) 0%, transparent 70%),
        /* bottom heavy vignette */
        radial-gradient(ellipse 160% 55% at 50% 100%, rgba(10,4,0,0.85) 0%, transparent 65%),
        /* left/right side vignettes */
        radial-gradient(ellipse 40% 100% at 0% 50%, rgba(10,4,0,0.55) 0%, transparent 70%),
        radial-gradient(ellipse 40% 100% at 100% 50%, rgba(10,4,0,0.55) 0%, transparent 70%),
        /* moody sky-to-earth gradient */
        linear-gradient(
          180deg,
          #1a0e04 0%,
          #2d1505 8%,
          #4a2108 18%,
          #7b4020 32%,
          #b86830 48%,
          #d4843a 56%,
          #9b5522 68%,
          #5c2e0e 80%,
          #2a1006 92%,
          #0d0400 100%
        );
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* animated grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.045;
      pointer-events: none;
      z-index: 0;
      animation: grainShift 0.12s steps(1) infinite;
    }

    @keyframes grainShift {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-3px, 2px); }
      50%  { transform: translate(3px, -2px); }
      75%  { transform: translate(-2px, -3px); }
      100% { transform: translate(2px, 3px); }
    }

    /* subtle floating ember particles */
    .embers {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .ember {
      position: absolute;
      bottom: -10px;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--amber);
      opacity: 0;
      animation: float var(--dur) var(--delay) ease-in infinite;
    }

    @keyframes float {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      10%  { opacity: 0.9; }
      80%  { opacity: 0.4; }
      100% { transform: translateY(-100vh) translateX(var(--drift)) scale(0.3); opacity: 0; }
    }

    /* ── MAIN CONTENT ── */
    .stage {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.4rem;
      padding: 2rem;
      text-align: center;
    }

    /* ── TITLE ── */
    .title-wrap {
      position: relative;
      display: inline-block;
    }

    h1 {
      font-family: 'Rye', serif;
      font-size: clamp(4.5rem, 13vw, 10.5rem);
      line-height: 1;
      letter-spacing: 0.02em;
      color: var(--cream);
      text-shadow:
        0 0 60px rgba(232,137,26,0.55),
        0 0 120px rgba(192,68,10,0.35),
        4px 6px 0px rgba(10,4,0,0.9),
        0 2px 3px rgba(10,4,0,0.8);
      animation: titleIn 1.1s cubic-bezier(0.16,1,0.3,1) both, glowPulse 4s ease-in-out 1.5s infinite;
    }

    /* the "R" in Ranch has its own treatment via split */
    h1 .accent { color: var(--amber); }

    @keyframes titleIn {
      from { opacity: 0; transform: translateY(-30px) scale(0.93); filter: blur(6px); }
      to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 60px rgba(232,137,26,0.55), 0 0 120px rgba(192,68,10,0.35), 4px 6px 0px rgba(10,4,0,0.9); }
      50%       { text-shadow: 0 0 90px rgba(232,137,26,0.75), 0 0 180px rgba(192,68,10,0.50), 4px 6px 0px rgba(10,4,0,0.9); }
    }

    /* decorative line under title */
    .title-wrap::after {
      content: '';
      display: block;
      margin: 0.7rem auto 0;
      width: 70%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--amber), var(--rust), var(--amber), transparent);
      animation: lineIn 0.9s 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes lineIn {
      from { transform: scaleX(0); opacity: 0; }
      to   { transform: scaleX(1); opacity: 1; }
    }

    /* ── TAGLINE ── */
    .tagline {
      font-family: 'Cabin', sans-serif;
      font-size: clamp(1rem, 2.4vw, 1.35rem);
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--cream);
      opacity: 0.82;
      animation: fadeUp 0.9s 0.55s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ── LINKS ── */
    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      animation: fadeUp 0.9s 0.85s cubic-bezier(0.16,1,0.3,1) both;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'Cabin', sans-serif;
      font-weight: 600;
      font-size: clamp(0.85rem, 1.8vw, 1rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--cream);
      padding: 0.55rem 1.6rem;
      border: 1px solid rgba(245,234,208,0.25);
      border-radius: 2px;
      background: rgba(10,4,0,0.35);
      backdrop-filter: blur(4px);
      transition: color 0.25s, border-color 0.25s, background 0.25s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(232,137,26,0.12), transparent);
      transform: translateX(-100%);
      transition: transform 0.4s ease;
    }

    .link-btn:hover::before { transform: translateX(100%); }

    .link-btn:hover {
      color: var(--amber);
      border-color: var(--amber);
      background: rgba(10,4,0,0.55);
      transform: translateY(-2px);
    }

    /* icons as inline SVG via CSS content — using unicode symbols */
    .icon { font-size: 1.1em; line-height: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Ember particles -->
  <div class="embers" id="embers"></div>

  <div class="stage">

    <div class="title-wrap">
      <h1>MonsteR<span class="accent">anch</span></h1>
    </div>

    <p class="tagline">Collect your monsters, build your ranch</p>

    <div class="links">
      <a class="link-btn" href="https://discord.gg/ACnWwGnQTM" target="_blank">
        <span class="icon">💬</span> Join our Discord
      </a>
      <a class="link-btn" href="https://www.youtube.com/@Monsteranch" target="_blank">
        <span class="icon">▶</span> Follow our YouTube
      </a>
    </div>

  </div>

  <script>
    // Spawn ember particles
    const container = document.getElementById('embers');
    for (let i = 0; i < 28; i++) {
      const e = document.createElement('div');
      e.className = 'ember';
      e.style.cssText = `
        left: ${Math.random() * 100}%;
        --dur: ${4 + Math.random() * 7}s;
        --delay: ${Math.random() * 8}s;
        --drift: ${(Math.random() - 0.5) * 120}px;
        width: ${1.5 + Math.random() * 3}px;
        height: ${1.5 + Math.random() * 3}px;
        background: hsl(${28 + Math.random() * 20}, 90%, ${55 + Math.random() * 20}%);
      `;
      container.appendChild(e);
    }
  </script>

</body>
</html>
