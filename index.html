<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MonsteRanch</title>
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Cabin:wght@400;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rust:    #C0440A;
      --amber:   #E8891A;
      --cream:   #F5EAD0;
      --shadow:  #1A0A00;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Cabin', sans-serif;

      background:
        url("https://raw.githubusercontent.com/Asteria-Devs/monsteranch/main/bg.png") center/cover no-repeat,
        radial-gradient(ellipse 120% 60% at 50% 0%, rgba(10,4,0,0.72) 0%, transparent 70%),
        radial-gradient(ellipse 160% 55% at 50% 100%, rgba(10,4,0,0.85) 0%, transparent 65%),
        radial-gradient(ellipse 40% 100% at 0% 50%, rgba(10,4,0,0.55) 0%, transparent 70%),
        radial-gradient(ellipse 40% 100% at 100% 50%, rgba(10,4,0,0.55) 0%, transparent 70%);

      background-blend-mode: normal, multiply, multiply, multiply, multiply;

      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.045;
      pointer-events: none;
      z-index: 0;
      animation: grainShift 0.12s steps(1) infinite;
    }

    @keyframes grainShift {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-3px, 2px); }
      50% { transform: translate(3px, -2px); }
      75% { transform: translate(-2px, -3px); }
      100% { transform: translate(2px, 3px); }
    }

    .embers {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .ember {
      position: absolute;
      bottom: -10px;
      border-radius: 50%;
      opacity: 0;
      animation: float var(--dur) var(--delay) ease-in infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); opacity: 0; }
      10% { opacity: 0.9; }
      80% { opacity: 0.4; }
      100% { transform: translateY(-100vh) translateX(var(--drift)) scale(0.3); opacity: 0; }
    }

    .stage {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.4rem;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-family: 'Rye', serif;
      font-size: clamp(4.5rem, 13vw, 10.5rem);
      color: var(--cream);
      text-shadow:
        0 0 60px rgba(232,137,26,0.55),
        0 0 120px rgba(192,68,10,0.35),
        4px 6px 0px rgba(10,4,0,0.9);
    }

    .accent {
      color: var(--amber);
    }

    .tagline {
      font-size: clamp(1rem, 2.4vw, 1.35rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--cream);
      opacity: 0.82;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .link-btn {
      display: inline-flex;
      gap: 0.6rem;
      color: var(--cream);
      padding: 0.55rem 1.6rem;
      border: 1px solid rgba(245,234,208,0.25);
      text-decoration: none;
      background: rgba(10,4,0,0.35);
      transition: 0.25s;
    }

    .link-btn:hover {
      color: var(--amber);
      border-color: var(--amber);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <div class="embers" id="embers"></div>

  <div class="stage">
    <h1>Monste<span class="accent">Ranch</span></h1>
    <p class="tagline">Collect your monsters, build your ranch</p>

    <div class="links">
      <a class="link-btn" href="https://discord.gg/ACnWwGnQTM" target="_blank">
        💬 Join our Discord
      </a>
      <a class="link-btn" href="https://www.youtube.com/@Monsteranch" target="_blank">
        ▶ Follow our YouTube
      </a>
    </div>
  </div>

  <script>
    const container = document.getElementById('embers');

    for (let i = 0; i < 28; i++) {
      const e = document.createElement('div');
      e.className = 'ember';
      e.style.cssText = `
        left: ${Math.random() * 100}%;
        --dur: ${4 + Math.random() * 7}s;
        --delay: ${Math.random() * 8}s;
        --drift: ${(Math.random() - 0.5) * 120}px;
        width: ${1.5 + Math.random() * 3}px;
        height: ${1.5 + Math.random() * 3}px;
        background: hsl(${28 + Math.random() * 20}, 90%, ${55 + Math.random() * 20}%);
      `;
      container.appendChild(e);
    }
  </script>

</body>
</html>
